name: Daily Job Scrape

on:
  schedule:
    - cron: "0 13 * * *"  # 21:00 Beijing
  workflow_dispatch:
    inputs:
      targets:
        description: 'Specific scrapers (e.g. tencent)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt
      - run: pip install -r scrapers/requirements.txt
      - run: python -m playwright install chromium && python -m playwright install-deps chromium
      - name: Run scrapers
        env: { TZ: Asia/Shanghai }
        run: |
          if [ -n "${{ github.event.inputs.targets }}" ]; then
            python scrapers/runner.py ${{ github.event.inputs.targets }}
          else
            python scrapers/runner.py
          fi
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "[auto] scrape $(TZ='Asia/Shanghai' date +'%Y-%m-%d')" && git push)

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    if: always() && needs.scrape.result != 'skipped'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest data
        run: git pull origin main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: frontend
        run: npm install && npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
          publish_branch: gh-pages
          force_orphan: true
